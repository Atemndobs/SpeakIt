<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body { font: 13px -apple-system, system-ui, sans-serif; margin: 0; padding: 12px 14px; width: 220px; }
      h1 { font-size: 13px; margin: 0 0 8px; font-weight: 600; }
      label { display: flex; align-items: center; gap: 8px; cursor: pointer; }
      p.hint { color: #666; margin: 8px 0 0; font-size: 11px; line-height: 1.4; }
    </style>
  </head>
  <body>
    <h1>SpeakIt</h1>
    <label>
      <input id="autoSpeak" type="checkbox" />
      Speak automatically on selection
    </label>
    <p class="hint">
      Right-click any selection → <em>Speak with SpeakIt</em> always works.
      Toggle above to also speak the moment you release the mouse.
    </p>
    <script src="popup.js"></script>
  </body>
</html>
